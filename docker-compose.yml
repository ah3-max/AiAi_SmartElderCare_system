services:
  postgres:
    image: postgres:16-alpine
    container_name: careflow_postgres
    environment:
      POSTGRES_USER: careflow
      POSTGRES_PASSWORD: careflow_dev_pw
      POSTGRES_DB: careflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careflow -d careflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: careflow_api
    environment:
      DATABASE_URL: "postgresql://careflow:careflow_dev_pw@postgres:5432/careflow"
      JWT_SECRET: "${JWT_SECRET:-change-this-in-production}"
      JWT_EXPIRES_IN: "8h"
      PORT: "3201"
      ALLOWED_ORIGINS: "http://localhost:3200,http://localhost:3202,http://192.168.0.138:3200,http://192.168.0.138:3202"
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN:-}"
      LINE_CHANNEL_SECRET: "${LINE_CHANNEL_SECRET:-}"
      LINE_NOTIFY_TOKEN: "${LINE_NOTIFY_TOKEN:-}"
      LIFF_BASE_URL: "${LIFF_BASE_URL:-}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-change-this-in-production}"
      TWCA_API_URL: "${TWCA_API_URL:-}"
      TWCA_API_KEY: "${TWCA_API_KEY:-}"
    command: node dist/main
    ports:
      - "3201:3201"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: careflow_web
    environment:
      NEXT_PUBLIC_API_URL: "http://api:3201"
    ports:
      - "3200:3001"
    depends_on:
      - api
    restart: unless-stopped

  liff:
    build:
      context: .
      dockerfile: apps/liff/Dockerfile
      args:
        VITE_LIFF_ID_ADMISSION: "${LIFF_ID_ADMISSION:-}"
        VITE_LIFF_ID_APPOINTMENT: "${LIFF_ID_APPOINTMENT:-}"
        VITE_LIFF_ID_VISIT: "${LIFF_ID_VISIT:-}"
        VITE_LIFF_ID_CONTRACT: "${LIFF_ID_CONTRACT:-}"
        VITE_API_URL: "${VITE_API_URL:-}"
    container_name: careflow_liff
    ports:
      - "3202:80"
    restart: unless-stopped

volumes:
  postgres_data:
